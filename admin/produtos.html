<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <div class="flex-between mb-2">
                <h2>📦 Gerenciar Produtos</h2>
                <button class="btn" onclick="abrirModalNovo()">+ Novo Produto</button>
            </div>
            <div id="produtos-table" class="table-responsive"></div>
        </div>
    </main>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Novo Produto</h2>
            <form id="form-produto" onsubmit="salvarProduto(event)">
                <input type="hidden" id="produto-id">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="produto-nome" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="produto-categoria" required>
                        <option value="eletronicos">📱 Eletrônicos</option>
                        <option value="moda">👕 Moda</option>
                        <option value="casa">🏠 Casa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="produto-preco" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="produto-descricao" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>URL da Imagem</label>
                    <input type="url" id="produto-imagem" placeholder="https://picsum.photos/seed/nome/400/400">
                </div>
                <div class="form-group">
                    <label>Estoque</label>
                    <input type="number" id="produto-estoque" min="0" value="10">
                </div>
                <button type="submit" class="btn btn-success">Salvar</button>
                <button type="button" class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../static/js/storage.js?v=1.0.0"></script>
    <script src="../static/js/components.js?v=1.0.0"></script>
    <script src="../static/js/auth-guard.js?v=1.0.0"></script>
    <script>
        async function carregarProdutos() {
            try {
                var produtos = await ProdutosStore.getAll();
                var container = document.getElementById('produtos-table');
                if (!produtos || produtos.length === 0) {
                    container.innerHTML = '<p class="text-center">Nenhum produto cadastrado.</p>';
                    return;
                }
                var html = '<table class="table"><thead><tr>' +
                    '<th>Nome</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Ativo</th><th>Ações</th>' +
                    '</tr></thead><tbody>';
                produtos.forEach(function(p) {
                    html += '<tr>' +
                        '<td>' + (p.nome || '-') + '</td>' +
                        '<td><span class="categoria-tag">' + (p.categoria || '-') + '</span></td>' +
                        '<td>R$ ' + parseFloat(p.preco || 0).toFixed(2).replace('.', ',') + '</td>' +
                        '<td>' + (p.estoque || 0) + '</td>' +
                        '<td>' + (p.ativo !== false ? '✅' : '❌') + '</td>' +
                        '<td>' +
                        '<button class="btn btn-sm" onclick="editarProduto(\'' + p.id + '\')">✏️</button> ' +
                        '<button class="btn btn-sm btn-danger" onclick="excluirProduto(\'' + p.id + '\')">🗑️</button>' +
                        '</td></tr>';
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                console.error('Erro:', e);
                document.getElementById('produtos-table').innerHTML = '<p class="text-center">Erro ao carregar.</p>';
            }
        }

        function abrirModalNovo() {
            document.getElementById('modal-titulo').textContent = 'Novo Produto';
            document.getElementById('produto-id').value = '';
            document.getElementById('form-produto').reset();
            document.getElementById('modal-produto').classList.add('active');
        }

        async function editarProduto(id) {
            var p = await ProdutosStore.getById(id);
            if (!p) return;
            document.getElementById('modal-titulo').textContent = 'Editar Produto';
            document.getElementById('produto-id').value = p.id;
            document.getElementById('produto-nome').value = p.nome || '';
            document.getElementById('produto-categoria').value = p.categoria || 'eletronicos';
            document.getElementById('produto-preco').value = p.preco || 0;
            document.getElementById('produto-descricao').value = p.descricao || '';
            document.getElementById('produto-imagem').value = p.imagem || '';
            document.getElementById('produto-estoque').value = p.estoque || 0;
            document.getElementById('modal-produto').classList.add('active');
        }

        async function salvarProduto(e) {
            e.preventDefault();
            var id = document.getElementById('produto-id').value;
            var dados = {
                nome: document.getElementById('produto-nome').value.trim(),
                categoria: document.getElementById('produto-categoria').value,
                preco: parseFloat(document.getElementById('produto-preco').value),
                descricao: document.getElementById('produto-descricao').value.trim(),
                imagem: document.getElementById('produto-imagem').value.trim() || ('https://picsum.photos/seed/' + Date.now() + '/400/400'),
                estoque: parseInt(document.getElementById('produto-estoque').value) || 0
            };
            try {
                var result;
                if (id) {
                    result = await ProdutosStore.update(id, dados);
                } else {
                    result = await ProdutosStore.save(dados);
                }
                if (result) {
                    alert('✅ Produto salvo!');
                    fecharModal();
                    carregarProdutos();
                } else {
                    alert('Erro ao salvar produto.');
                }
            } catch (e) {
                console.error('Erro:', e);
                alert('Erro ao salvar produto.');
            }
        }

        async function excluirProduto(id) {
            if (!confirm('Excluir este produto?')) return;
            try {
                await ProdutosStore.delete(id);
                alert('Produto excluído.');
                carregarProdutos();
            } catch (e) {
                alert('Erro ao excluir.');
            }
        }

        function fecharModal() {
            document.getElementById('modal-produto').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', carregarProdutos);
    </script>
</body>
</html>
