<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovar Acesso - Loja Online</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 1rem;
        }
        .container-aprovar {
            background: rgba(255,255,255,0.95);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .container-aprovar h1 { color: var(--cor-principal); margin-bottom: 1rem; }
        .container-aprovar p { color: #666; margin-bottom: 2rem; }
        .btn-aprovar {
            width: 100%; padding: 1rem; background: #28a745; color: white;
            border: none; border-radius: 8px; font-size: 1.2rem; font-weight: 600; cursor: pointer;
        }
        .btn-aprovar:hover { background: #218838; }
        .btn-negar {
            width: 100%; padding: 1rem; background: #dc3545; color: white;
            border: none; border-radius: 8px; font-size: 1.2rem; font-weight: 600; cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-negar:hover { background: #c82333; }
        .status { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 500; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .token-display {
            font-size: 2rem; font-weight: bold; color: var(--cor-principal);
            letter-spacing: 0.3rem; margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container-aprovar">
        <h1>🔐 Aprovar Acesso</h1>
        <p>Alguém está tentando acessar o painel administrativo.</p>
        <div id="status" class="status"></div>
        <p>Código de acesso:</p>
        <div class="token-display" id="token-display">---</div>
        <button class="btn-aprovar" id="btn-aprovar" onclick="aprovar()">✅ Aprovar Acesso</button>
        <button class="btn-negar" id="btn-negar" onclick="negar()">❌ Negar Acesso</button>
    </div>

    <script src="../static/js/storage.js?v=1.0.0"></script>
    <script>
        var tokenAtual = null;

        function getTokenFromHash() {
            var hash = window.location.hash.substring(1);
            var params = new URLSearchParams(hash);
            return params.get('token') || hash;
        }

        async function init() {
            tokenAtual = getTokenFromHash();
            if (!tokenAtual) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = 'Nenhum token encontrado na URL.';
                document.getElementById('btn-aprovar').disabled = true;
                document.getElementById('btn-negar').disabled = true;
                return;
            }
            document.getElementById('token-display').textContent = tokenAtual;
            await initAPI();
        }

        async function aprovar() {
            if (!tokenAtual) return;
            try {
                var result = await apiRequest('/api/update', {
                    method: 'POST',
                    body: JSON.stringify({
                        table: 'sessoes',
                        id: tokenAtual,
                        data: { status: 'aprovado' }
                    })
                });
                if (result && result.success) {
                    document.getElementById('status').className = 'status success';
                    document.getElementById('status').textContent = '✅ Acesso aprovado! A sessão será ativada em instantes.';
                    document.getElementById('btn-aprovar').disabled = true;
                    document.getElementById('btn-negar').disabled = true;
                } else {
                    document.getElementById('status').className = 'status error';
                    document.getElementById('status').textContent = 'Erro ao aprovar. Tente novamente.';
                }
            } catch (e) {
                console.error('Erro ao aprovar:', e);
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = 'Erro ao aprovar. Tente novamente.';
            }
        }

        async function negar() {
            if (!tokenAtual) return;
            try {
                await apiRequest('/api/update', {
                    method: 'POST',
                    body: JSON.stringify({
                        table: 'sessoes',
                        id: tokenAtual,
                        data: { status: 'negado' }
                    })
                });
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '❌ Acesso negado.';
                document.getElementById('btn-aprovar').disabled = true;
                document.getElementById('btn-negar').disabled = true;
            } catch (e) {
                console.error('Erro ao negar:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
