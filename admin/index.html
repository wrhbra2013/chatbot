<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <h2 class="section-title">Dashboard Administrativo</h2>
            <div id="dashboard-cards" class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>📦 Total de Produtos</h3>
                    <div class="dashboard-value" id="total-produtos">-</div>
                    <a href="produtos.html" class="card-link">Gerenciar &rarr;</a>
                </div>
                <div class="dashboard-card">
                    <h3>🛒 Pedidos Pendentes</h3>
                    <div class="dashboard-value" id="pedidos-pendentes">-</div>
                    <a href="pedidos.html" class="card-link">Ver Pedidos &rarr;</a>
                </div>
                <div class="dashboard-card">
                    <h3>✅ Pedidos Confirmados</h3>
                    <div class="dashboard-value" id="pedidos-confirmados">-</div>
                    <a href="pedidos.html" class="card-link">Ver &rarr;</a>
                </div>
                <div class="dashboard-card">
                    <h3>💬 Mensagens</h3>
                    <div class="dashboard-value" id="total-contatos">-</div>
                    <a href="#" class="card-link">Ver &rarr;</a>
                </div>
            </div>

            <div class="card">
                <h3>📋 Últimos Pedidos</h3>
                <div id="ultimos-pedidos">
                    <p class="text-center">Carregando...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../static/js/storage.js?v=1.0.0"></script>
    <script src="../static/js/components.js?v=1.0.0"></script>
    <script src="../static/js/auth-guard.js?v=1.0.0"></script>
    <script>
        async function carregarDashboard() {
            try {
                var [produtos, pedidos, contatos] = await Promise.all([
                    ProdutosStore.getAll(),
                    PedidosStore.getAll(),
                    ContatosStore.getAll()
                ]);

                document.getElementById('total-produtos').textContent = (produtos || []).length;
                document.getElementById('pedidos-pendentes').textContent = (pedidos || []).filter(function(p) { return p.status === 'pendente'; }).length;
                document.getElementById('pedidos-confirmados').textContent = (pedidos || []).filter(function(p) { return p.status !== 'pendente'; }).length;
                document.getElementById('total-contatos').textContent = (contatos || []).length;

                var recentes = (pedidos || []).slice(0, 10);
                var html = '';
                if (recentes.length === 0) {
                    html = '<p class="text-center">Nenhum pedido ainda.</p>';
                } else {
                    html = '<div class="table-responsive"><table class="table"><thead><tr>' +
                        '<th>Cliente</th><th>Total</th><th>Status</th><th>Data</th></tr></thead><tbody>';
                    recentes.forEach(function(p) {
                        var statusClass = p.status === 'pendente' ? 'badge-warning' : 'badge-success';
                        var data = p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR') : '-';
                        html += '<tr><td>' + (p.cliente_nome || '-') + '</td>' +
                            '<td>R$ ' + parseFloat(p.total || 0).toFixed(2).replace('.', ',') + '</td>' +
                            '<td><span class="badge ' + statusClass + '">' + (p.status || 'pendente') + '</span></td>' +
                            '<td>' + data + '</td></tr>';
                    });
                    html += '</tbody></table></div>';
                }
                document.getElementById('ultimos-pedidos').innerHTML = html;
            } catch (e) {
                console.error('Erro no dashboard:', e);
                document.getElementById('ultimos-pedidos').innerHTML = '<p class="text-center">Erro ao carregar dados.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', carregarDashboard);
    </script>
</body>
</html>
