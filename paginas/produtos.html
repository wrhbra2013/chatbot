<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Chatbot E-commerce</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
</head>
<body>
    <div id="banner-comercial"></div>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <div class="card mb-2">
                <form id="searchForm" class="flex gap-1" style="flex-wrap:wrap;">
                    <select id="category-select" class="form-group" style="flex:1;min-width:180px;margin:0;">
                        <option value="">Todas as categorias</option>
                    </select>
                    <input type="text" id="search-input" class="form-group" placeholder="Buscar produto..." style="flex:2;min-width:200px;margin:0;">
                    <button type="submit" class="btn" id="btnBuscar" style="white-space:nowrap;">🔍 Buscar</button>
                </form>
            </div>

            <div id="status" class="status" style="display:none;"></div>
            <div id="results" class="produtos-grid"></div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../static/js/components.js?v=1.0.0"></script>
    <script>
        var statusDiv = document.getElementById('status');
        var resultsDiv = document.getElementById('results');
        var categorySelect = document.getElementById('category-select');
        var searchInput = document.getElementById('search-input');
        var searchForm = document.getElementById('searchForm');
        var btnBuscar = document.getElementById('btnBuscar');

        function fmtBRL(v) {
            return 'R$ ' + v.toFixed(2).replace('.', ',');
        }

        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function setStatus(msg, type) {
            statusDiv.className = 'status ' + (type || 'info');
            statusDiv.textContent = msg;
            statusDiv.style.display = 'block';
        }

        function hideStatus() {
            statusDiv.style.display = 'none';
        }

        async function carregarCategorias() {
            try {
                var resp = await fetch('/data/produtos');
                var produtos = await resp.json();
                var cats = {};
                produtos.forEach(function(p) { if (p.categoria) cats[p.categoria] = true; });
                Object.keys(cats).sort().forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
                    categorySelect.appendChild(opt);
                });
            } catch (e) {
                console.error('Erro ao carregar categorias:', e);
            }
        }

        function adicionarAoCarrinho(prod) {
            var carrinho = JSON.parse(localStorage.getItem('carrinho_temp') || '[]');
            var existente = null;
            for (var i = 0; i < carrinho.length; i++) {
                if (carrinho[i].id === prod.id) {
                    existente = carrinho[i];
                    break;
                }
            }
            if (existente) {
                existente.qtd = (existente.qtd || 1) + 1;
            } else {
                carrinho.push({
                    id: prod.id,
                    nome: prod.nome,
                    preco: parseFloat(prod.preco),
                    qtd: 1,
                    imagem: prod.imagem || '',
                    categoria: prod.categoria || '',
                });
            }
            localStorage.setItem('carrinho_temp', JSON.stringify(carrinho));
            alert('✅ "' + prod.nome + '" adicionado ao carrinho!');
        }

        function renderProducts(results) {
            if (!results || results.length === 0) {
                resultsDiv.innerHTML = '<p class="text-center" style="grid-column:1/-1;padding:40px;color:#888;">Nenhum produto encontrado.</p>';
                return;
            }

            resultsDiv.innerHTML = results.map(function(prod) {
                var img = prod.imagem || 'https://via.placeholder.com/280x180?text=Sem+Imagem';
                var priceHtml = '<div class="preco">' + fmtBRL(parseFloat(prod.preco)) + '</div>';
                var estoqueHtml = prod.estoque > 0
                    ? '<div class="estoque">Estoque: ' + prod.estoque + ' un.</div>'
                    : '<div class="estoque" style="color:#dc3545;">Indisponivel</div>';

                return '<div class="produto-card">' +
                    '<span class="categoria-tag">' + escHtml(prod.categoria) + '</span>' +
                    '<img class="produto-img" src="' + img + '" alt="' + escHtml(prod.nome) + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/280x180?text=Sem+Imagem\'">' +
                    '<div class="produto-body">' +
                    '<h3>' + escHtml(prod.nome) + '</h3>' +
                    '<div class="descricao">' + escHtml(prod.descricao || '') + '</div>' +
                    priceHtml +
                    estoqueHtml +
                    '<button class="btn btn-sm" onclick="adicionarAoCarrinho(' + JSON.stringify(prod).replace(/"/g, "'") + ')">🛒 Comprar</button>' +
                    '</div></div>';
            }).join('\n');
        }

        async function buscar() {
            var categoria = categorySelect.value;
            var search = searchInput.value.trim();

            btnBuscar.disabled = true;
            hideStatus();
            resultsDiv.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">Buscando produtos...</p>';

            try {
                var params = new URLSearchParams({ limit: '50' });
                if (categoria) params.set('categoria', categoria);
                if (search) params.set('search', search);

                var resp = await fetch('/api/produtos?' + params.toString());
                var result = await resp.json();

                if (result.success) {
                    var msg = result.data.length + ' produto(s) encontrado(s).';
                    if (categoria) msg += ' Categoria: ' + categoria;
                    setStatus(msg, 'ok');
                    renderProducts(result.data);
                    hideStatus();
                } else {
                    setStatus('Erro: ' + (result.error || 'Erro desconhecido'), 'erro');
                    resultsDiv.innerHTML = '';
                }
            } catch (err) {
                setStatus('Erro ao buscar produtos: ' + err.message, 'erro');
                resultsDiv.innerHTML = '';
            } finally {
                btnBuscar.disabled = false;
            }
        }

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            buscar();
        });

        carregarCategorias();
        buscar();
    </script>
</body>
</html>
