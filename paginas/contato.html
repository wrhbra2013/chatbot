<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Catálogo WhatsApp</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
</head>
<body>
    <div id="banner-comercial"></div>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <h2 class="section-title">Entre em Contato</h2>

            <div class="card">
                <form id="form-contato" onsubmit="enviarContato(event)">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="contato-nome" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="contato-email">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="contato-telefone" placeholder="(14) 99999-9999">
                    </div>
                    <div class="form-group">
                        <label>Mensagem</label>
                        <textarea id="contato-mensagem" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Enviar</button>
                </form>
            </div>

            <div class="card text-center mt-2">
                <h3>Ou fale conosco pelo WhatsApp</h3>
                <p>Atendimento rápido e personalizado.</p>
                <a href="https://wa.me/5514999999999?text=Olá!%20Gostaria%20de%20saber%20mais." class="btn btn-success mt-1" target="_blank">Falar no WhatsApp</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../static/js/storage.js?v=1.0.0"></script>
    <script src="../static/js/components.js?v=1.0.0"></script>
    <script>
        async function enviarContato(e) {
            e.preventDefault();

            var dados = {
                nome: document.getElementById('contato-nome').value.trim(),
                email: document.getElementById('contato-email').value.trim(),
                telefone: document.getElementById('contato-telefone').value.trim(),
                mensagem: document.getElementById('contato-mensagem').value.trim()
            };

            if (!dados.nome || !dados.mensagem) {
                alert('Preencha nome e mensagem.');
                return;
            }

            try {
                var result = await ContatosStore.save(dados);
                if (result) {
                    alert('✅ Mensagem enviada com sucesso! Entraremos em contato em breve.');
                    document.getElementById('form-contato').reset();
                } else {
                    alert('Erro ao enviar mensagem. Tente novamente.');
                }
            } catch (e) {
                console.error('Erro ao enviar contato:', e);
                alert('Erro ao enviar mensagem. Tente novamente.');
            }
        }
    </script>
</body>
</html>
