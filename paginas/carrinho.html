<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Chatbot E-commerce</title>
    <link rel="icon" type="image/png" href="../static/icon/favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css?v=1.0.0">
</head>
<body>
    <div id="banner-comercial"></div>
    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <h2>🛒 Meu Carrinho</h2>
            <div id="carrinho-container" class="card"></div>
            <div id="carrinho-vazio" style="display:none;">
                <div class="card text-center">
                    <p style="font-size:1.2rem;color:#666;">Seu carrinho está vazio.</p>
                    <a href="produtos.html" class="btn mt-1">Ver Produtos</a>
                </div>
            </div>

            <div class="card text-center" style="background:#e8f5e9;border-color:#c8e6c9;">
                <h3>📱 Finalize seu pedido pelo WhatsApp</h3>
                <p style="color:#555;margin-bottom:1rem;">
                    Seu carrinho é salvo automaticamente. Envie uma mensagem no WhatsApp para finalizar a compra.<br>
                    <strong>Comandos:</strong> <em>carrinho</em>, <em>finalizar</em>, <em>limpar</em>
                </p>
                <p style="font-size:0.9rem;color:#888;">
                    Os itens adicionados aqui aparecem no seu carrinho do WhatsApp.
                </p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../static/js/components.js?v=1.0.0"></script>
    <script>
        var carrinhoAtual = [];

        function carregarCarrinho() {
            try {
                carrinhoAtual = JSON.parse(localStorage.getItem('carrinho_temp') || '[]');
            } catch(e) {
                carrinhoAtual = [];
            }
            renderizarCarrinho();
        }

        function renderizarCarrinho() {
            var container = document.getElementById('carrinho-container');
            var vazio = document.getElementById('carrinho-vazio');

            if (!carrinhoAtual || carrinhoAtual.length === 0) {
                container.style.display = 'none';
                vazio.style.display = 'block';
                return;
            }

            container.style.display = 'block';
            vazio.style.display = 'none';

            var html = '';
            var total = 0;

            carrinhoAtual.forEach(function(item, idx) {
                var subtotal = parseFloat(item.preco) * (item.qtd || 1);
                total += subtotal;
                html += '<div class="carrinho-item">' +
                    '<div><strong>' + item.nome + '</strong><br><small>R$ ' + item.preco.toFixed(2).replace('.', ',') + ' un.</small></div>' +
                    '<div class="flex gap-1" style="align-items:center;">' +
                    '<button class="btn btn-sm btn-outline" onclick="alterarQtd(' + idx + ', -1)">-</button>' +
                    '<span>' + (item.qtd || 1) + '</span>' +
                    '<button class="btn btn-sm btn-outline" onclick="alterarQtd(' + idx + ', 1)">+</button>' +
                    '<span style="font-weight:bold;margin-left:1rem;">R$ ' + subtotal.toFixed(2).replace('.', ',') + '</span>' +
                    '<button class="btn btn-sm btn-danger" onclick="removerItem(' + idx + ')">✕</button>' +
                    '</div></div>';
            });

            html += '<div class="carrinho-total">Total: R$ ' + total.toFixed(2).replace('.', ',') + '</div>';
            html += '<div class="flex gap-1" style="justify-content:flex-end;">' +
                '<button class="btn btn-danger" onclick="limparCarrinho()">🗑️ Limpar</button>' +
                '</div>';

            container.innerHTML = html;
        }

        function alterarQtd(idx, delta) {
            if (!carrinhoAtual[idx]) return;
            carrinhoAtual[idx].qtd = Math.max(1, (carrinhoAtual[idx].qtd || 1) + delta);
            salvarCarrinho();
        }

        function removerItem(idx) {
            carrinhoAtual.splice(idx, 1);
            salvarCarrinho();
        }

        function limparCarrinho() {
            if (!confirm('Limpar carrinho?')) return;
            carrinhoAtual = [];
            salvarCarrinho();
        }

        function salvarCarrinho() {
            localStorage.setItem('carrinho_temp', JSON.stringify(carrinhoAtual));
            renderizarCarrinho();
        }

        document.addEventListener('DOMContentLoaded', carregarCarrinho);
    </script>
</body>
</html>
